version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: crop_predict_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crop_user
      POSTGRES_PASSWORD: crop_password
      POSTGRES_DB: crop_predict_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crop_user -d crop_predict_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crop_predict_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+pg8000://crop_user:crop_password@db:5432/crop_predict_db
      JWT_SECRET_KEY: docker-secret-key-change-in-production
      APP_ENV: development
      CORS_ORIGINS: http://localhost:4200,http://localhost:80
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # Angular Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crop_predict_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
